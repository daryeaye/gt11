<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geotopia Powerfall Pt4</title>

  <link href="https://fonts.googleapis.com/css2?family=Caveat&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Love+Ya+Like+A+Sister&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      overflow-y: auto;
      background: url('https://daryeaye.github.io/geotopia/thatsit.png') no-repeat center center fixed;
      background-size: cover;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 10px 0 40px;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }
    #app-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }
    #header {
      width: 960px;
      background: #eee;
      padding: 10px;
      margin-bottom: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      position: sticky;
      top: 0;
      z-index: 2000;
      box-shadow: 0 2px 6px rgba(0,0,0,0.12);
      box-sizing: border-box;
    }
    #topAuthRow, #progressRow {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      width: 100%;
      box-sizing: border-box;
    }
    #topAuthLeft {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    #logoutBtn, #introBtn, #authRegisterBtn, #authLoginBtn, #openFileBtn, #prev-btn, #next-btn, #collapse-widget,
    #side-widget button:not(#collapse-widget) {
      font-family: "Love Ya Like A Sister", cursive;
    }
    #logoutBtn, #introBtn, #authRegisterBtn, #authLoginBtn {
      font-size: 22px;
      padding: 6px 12px;
      cursor: pointer;
      background-color: lightblue;
      border: none;
      line-height: 1;
      border-radius: 6px;
    }
    #authStatus {
      font-size: 15px;
      font-family: "Comic Sans MS", sans-serif;
      color: #222;
      min-width: 170px;
      text-align: right;
    }
    #progressBar {
      flex: 1;
      background: #ccc;
      height: 20px;
      margin: 0 10px 0 0;
      position: relative;
    }
    #progress {
      background: green;
      height: 100%;
      width: 0%;
    }
    #progressText {
      font-size: 16px;
      white-space: nowrap;
    }
    #saveStatus {
      font-size: 13px;
      color: #444;
      min-width: 120px;
      text-align: right;
    }
    #main-area {
      width: 100%;
      display: flex;
      justify-content: center;
    }
    #main-wrapper {
      position: relative;
      width: 960px;
    }
    #nav-buttons {
      position: absolute;
      top: 50%;
      left: -150px;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 3000;
    }
    button {
      font-family: "Comic Sans MS", sans-serif;
      font-size: 20px;
      background-color: lightblue;
      border: none;
      padding: 10px 20px;
      margin: 0;
      cursor: pointer;
    }
    #container {
      position: relative;
      width: 960px;
      height: 540px;
      border: 1px solid #ccc;
      background: white;
      overflow: hidden;
    }
    .page {
      position: absolute;
      top: 0;
      left: 0;
      width: 960px;
      height: 540px;
      display: none;
      overflow: hidden;
      background: white;
    }
    .page.active {
      display: block;
    }
    .page-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      pointer-events: none;
      background: white;
      z-index: 1;
    }
    .textbox {
      position: absolute;
      background-color: #bdbdbd;
      border: 1px solid black;
      font-family: "Comic Sans MS", sans-serif;
      color: black;
      padding: 2px 6px;
      box-sizing: border-box;
      z-index: 30;
      resize: none;
      outline: none;
    }
    .answerbox {
      font-size: 20px;
      text-align: center;
      padding: 0 4px;
    }
    .smallbox {
      font-size: 14px;
      text-align: center;
      padding: 0 4px;
    }
    .bigbox {
      font-size: 20px;
      text-align: left;
      vertical-align: top;
      line-height: 1.2;
      padding: 6px;
    }
    .hotspot {
      position: absolute;
      z-index: 9999;
      background: rgba(173,216,230,0.95);
      border: 2px solid #000;
      border-radius: 8px;
      color: #000;
      font-family: "Comic Sans MS", sans-serif;
      font-size: 18px;
    }
    .invisible-choice {
      position: absolute;
      z-index: 9999;
      background: transparent !important;
      border: none !important;
      border-radius: 0 !important;
      padding: 0 !important;
      margin: 0 !important;
      box-shadow: none !important;
      cursor: pointer;
    }
    .project-overlay {
      position: absolute;
      z-index: 80;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.75);
      color: #26ff63;
      font-family: 'Orbitron', sans-serif;
      font-size: 20px;
      font-weight: 700;
      text-align: center;
      pointer-events: none;
      padding: 8px;
      box-sizing: border-box;
    }
    .sda-wrap {
      position: absolute;
      overflow: hidden;
      z-index: 24;
      display: none;
      pointer-events: none;
      background: transparent;
    }
    .sda-result-full,
    .sda-door {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: none;
    }
    .sda-result-full {
      object-fit: fill;
      z-index: 1;
    }
    .sda-result-false {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      max-width: 100%;
      max-height: 100%;
      display: none;
      object-fit: contain;
      z-index: 1;
    }
    .sda-door {
      object-fit: fill;
      z-index: 2;
      transform: translateY(-100%);
    }
    #pageTransitionOverlay {
      position: absolute;
      inset: 0;
      background: #000;
      z-index: 10050;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.28s ease;
    }
    #side-widget {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 200px;
      height: 200px;
      background: #f9f9f9;
      border: 1px solid #ccc;
      padding: 10px;
      box-sizing: border-box;
      font-family: 'Caveat', cursive;
      z-index: 999;
      transition: all 0.25s ease;
    }
    #side-widget.collapsed {
      width: 120px;
      height: 24px;
      padding: 0;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      background: rgba(249,249,249,0.95);
      border: 1px solid #ccc;
      font-family: "Comic Sans MS", sans-serif;
      font-size: 8px;
      line-height: 1;
      white-space: nowrap;
    }
    #side-widget.collapsed * {
      display: none !important;
    }
    #side-widget.collapsed::after {
      content: "Translation";
    }
    #collapse-widget {
      position: absolute;
      top: 6px;
      right: 6px;
      width: 22px;
      height: 22px;
      padding: 0;
      line-height: 1;
      font-size: 14px;
      background: lightblue;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-family: "Comic Sans MS", sans-serif;
    }
    #side-widget p.title {
      font-size: 24px;
      text-align: center;
      margin: 0 0 10px;
    }
    #side-widget button:not(#collapse-widget) {
      display: block;
      margin: 0 auto;
      font-size: 20px;
      cursor: pointer;
      text-align: center;
      background: lightblue;
      border: none;
      padding: 10px;
      font-family: "Comic Sans MS", sans-serif;
    }
    #side-widget a {
      display: block;
      margin: 0 auto;
      font-size: 14px;
      cursor: pointer;
      text-align: center;
      background: lightblue;
      border: none;
      padding: 6px;
      text-decoration: none;
      color: inherit;
      font-family: "Comic Sans MS", sans-serif;
    }
    #selection-overlay {
      position: fixed;
      inset: 0;
      cursor: crosshair;
      z-index: 11000;
      background: rgba(0,0,0,0.03);
    }
    #selection-box {
      position: absolute;
      border: 2px dashed red;
      background: rgba(0, 0, 0, 0.1);
    }
    #role-container {
      position: relative;
      width: 960px;
      height: 540px;
      border: 1px solid #ccc;
      box-sizing: border-box;
      margin-top: 10px;
      overflow: hidden;
      background: #fff;
    }
    #role-stage {
      position: absolute;
      top: 0;
      left: 0;
      width: 1600px;
      height: 900px;
      transform-origin: top left;
      transform: scale(0.6);
      background: url('https://daryeaye.github.io/geotopia/role.jpg') no-repeat center/cover;
    }
    .role-hotspot {
      position: absolute;
      background: rgba(255,0,0,0);
      border: none;
      padding: 0;
      margin: 0;
      cursor: pointer;
    }
    #pdfViewer {
      position: absolute;
      inset: 0;
      display: none;
      overflow-y: auto;
      overflow-x: hidden;
      background: #fff;
      z-index: 5;
    }
    .pdfPageCanvas {
      display: block;
      margin: 12px auto;
      background: white;
    }
    #pdfStatus {
      position: absolute;
      top: 10px;
      left: 10px;
      font-family: "Comic Sans MS", sans-serif;
      font-size: 14px;
      color: #111;
      background: rgba(255,255,255,0.85);
      padding: 6px 10px;
      border: 1px solid rgba(0,0,0,0.15);
      border-radius: 6px;
      z-index: 10;
      display: none;
    }
    #role-container.pdf-mode #role-stage {
      display: none;
    }
    #openFileWrap {
      width: 960px;
      text-align: center;
      margin-top: 10px;
    }
    #openFileBtn {
      font-size: 16px;
      padding: 8px 16px;
      background: lightblue;
      border: none;
      cursor: pointer;
      border-radius: 6px;
      line-height: 1;
    }
    #authOverlay, #customPopupOverlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.78);
      z-index: 15000;
      display: none;
      align-items: center;
      justify-content: center;
    }
    #customPopupOverlay {
      z-index: 20000;
      background: rgba(0,0,0,0.55);
    }
    #authOverlayBox, #customPopupBox {
      width: min(430px, 88vw);
      background: #fffdf7;
      border: 3px solid #000;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      padding: 24px 20px 18px;
      text-align: center;
      box-sizing: border-box;
    }
    #authOverlayTitle {
      font-family: "Love Ya Like A Sister", cursive;
      font-size: 34px;
      line-height: 1.05;
      margin-bottom: 10px;
      color: #111;
    }
    #authOverlayText {
      font-family: "Comic Sans MS", sans-serif;
      font-size: 16px;
      line-height: 1.35;
      color: #222;
      margin-bottom: 14px;
    }
    #auth-username, #auth-password {
      width: 100%;
      font-size: 18px;
      padding: 10px 12px;
      margin-bottom: 10px;
      box-sizing: border-box;
      border: 2px solid #000;
      border-radius: 8px;
      font-family: "Comic Sans MS", sans-serif;
      background: #fff;
    }
    #authOverlayButtons, #customPopupButtons {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 6px;
    }
    #authModalStatus {
      font-family: "Comic Sans MS", sans-serif;
      font-size: 14px;
      line-height: 1.3;
      min-height: 18px;
      margin-top: 12px;
      color: #222;
    }
    #customPopupMessage {
      font-size: 24px;
      line-height: 1.35;
      color: #111;
      margin-bottom: 18px;
      font-family: "Comic Sans MS", sans-serif;
    }
    .popupBtn {
      font-family: "Love Ya Like A Sister", cursive;
      font-size: 24px;
      background: lightblue;
      border: 2px solid #000;
      border-radius: 10px;
      padding: 8px 20px;
      cursor: pointer;
    }
  </style>
</head>

        b.onclick = () => {

          if (btn.action) btn.action();

        btnWrap.appendChild(b);
      });
      overlay.style.display = "flex";

      await wait(60);
      overlay.style.opacity = "0";
      await wait(280);
      overlay.style.pointerEvents = "none";

    async function triggerSda(pageNum, isCorrect) {
      const wrap = document.getElementById(`sda-${pageNum}`);
      if (!wrap || sdaBusyPages[pageNum]) return;
      if (sdaSolvedPages[pageNum]) {
        setSdaDisplay(pageNum, 'true');
        return;
      }
      const resultFull = wrap.querySelector('.sda-result-full');
      const resultFalse = wrap.querySelector('.sda-result-false');
      const door = wrap.querySelector('.sda-door');
      const cfg = SDA_CONFIG[pageNum];
      sdaBusyPages[pageNum] = true;

      wrap.style.display = 'block';
      resultFull.src = cfg.trueImage;
      resultFull.style.display = 'none';
      resultFalse.style.display = 'none';
      door.src = cfg.doorImage;
      door.style.display = 'block';
      door.style.transition = 'none';
      door.style.transform = 'translateY(-100%)';

      await wait(30);
      door.style.transition = 'transform 1.2s ease';
      door.style.transform = 'translateY(0%)';
      await wait(1300);

      if (isCorrect) {
        resultFull.style.display = 'block';
        resultFalse.style.display = 'none';
      } else {
        resultFull.style.display = 'none';
        resultFalse.style.display = 'block';
      }

      await wait(240);
      door.style.transform = 'translateY(-100%)';
      await wait(1300);
      door.style.display = 'none';

      if (isCorrect) {
        sdaSolvedPages[pageNum] = true;
        if ([4,5,6].includes(pageNum)) projectCompleted.A = true;
        if ([7,8,9].includes(pageNum)) projectCompleted.B = true;
        if ([10,11,12].includes(pageNum)) projectCompleted.C = true;
        updateProjectCompletionFromSda();
        setSdaDisplay(pageNum, 'true');
      } else {
        resultFull.style.display = 'none';
        resultFalse.style.display = 'block';
        await wait(3000);
        if (!sdaSolvedPages[pageNum]) {
          setSdaDisplay(pageNum, 'hidden');
        } else {
          setSdaDisplay(pageNum, 'true');
        }
      }
      sdaBusyPages[pageNum] = false;
      queueCloudSave();
    }

    async function nextPage() {

        currentFlow = 'main';
        await runCanvasTransition(() => showPage(13));
        queueCloudSave();
        return;
      }
      if ([4,5,6,7,8,9,10,11,12,14,15,16].includes(currentPage) && !canLeaveSdaPage(currentPage)) {
        showMessagePopup(CREATE_BATTERY_WARNING);
        return;
      }
      if (currentPage === 6) {
        currentFlow = 'main';
        updateProjectCompletionFromSda();
        await runCanvasTransition(() => showPage(3));
        if (allProjectsCompleted()) showMessagePopup(PROJECTS_DONE_MESSAGE);
        queueCloudSave();
        return;
      }
      if (currentPage === 9) {

    function getInputSnapshot() {
      const snapshot = {};
      document.querySelectorAll('[data-savekey]').forEach(input => {
        snapshot[input.dataset.savekey] = input.value || '';
      });
      return snapshot;
    }
    function applyInputSnapshot(snapshot) {
      isApplyingRemoteData = true;
      document.querySelectorAll('[data-savekey]').forEach(input => {
        const key = input.dataset.savekey;
        input.value = snapshot && Object.prototype.hasOwnProperty.call(snapshot, key) ? (snapshot[key] ?? '') : '';

    function buildProgressPayload() {
      const viewer = document.getElementById('pdfViewer');
      return {
        playerName: loggedInUsername,
        currentPage,
        currentFlow,
        finalBranchTarget,
        maxProgressIndex,
        currentPdfUrl,
        currentPdfRole,
        pdfScrollTop: viewer ? viewer.scrollTop : 0,
        inputValues: getInputSnapshot(),
        projectCompleted,
        sdaSolvedPages
      };
    }
async function applyProgressPayload(payload) {
  isApplyingRemoteData = true;
  const safe = payload && typeof payload === 'object' ? payload : {};

  applyInputSnapshot(safe.inputValues || {});
  currentPage = Number.isInteger(Number(safe.currentPage)) ? Number(safe.currentPage) : 1;
  currentFlow = typeof safe.currentFlow === 'string' ? safe.currentFlow : 'main';
  finalBranchTarget = safe.finalBranchTarget === 20 ? 20 : (safe.finalBranchTarget === 19 ? 19 : null);
  maxProgressIndex = Number.isFinite(Number(safe.maxProgressIndex)) ? Number(safe.maxProgressIndex) : 0;
  currentPdfUrl = String(safe.currentPdfUrl || '');
  currentPdfRole = String(safe.currentPdfRole || '');
  pdfScrollTop = Number.isFinite(Number(safe.pdfScrollTop)) ? Number(safe.pdfScrollTop) : 0;

  // Fix restored navigation state
  if (currentPage === 19 || currentPage === 20) {
    currentFlow = 'main';
    finalBranchTarget = currentPage;
  } else if (currentPage >= 13 && currentPage <= 18) {
    currentFlow = 'main';
  }

  Object.keys(projectCompleted).forEach(key => {
    projectCompleted[key] = !!(safe.projectCompleted && safe.projectCompleted[key]);
  });

  const localProjectCompleted = loadProjectCompletionLocal();
  Object.keys(projectCompleted).forEach(key => {
    projectCompleted[key] = !!(projectCompleted[key] || (localProjectCompleted && localProjectCompleted[key]));
  });

  Object.keys(sdaSolvedPages).forEach(key => delete sdaSolvedPages[key]);
  if (safe.sdaSolvedPages && typeof safe.sdaSolvedPages === 'object') {
    Object.keys(safe.sdaSolvedPages).forEach(key => {
      sdaSolvedPages[key] = !!safe.sdaSolvedPages[key];
    });
  }

  updateProjectCompletionFromSda();
  syncSolvedPagesFromAnswers();
  updateProjectOverlays();
  showPage(currentPage);

  if (currentPdfUrl) {
    try {
      await renderPdfIntoSecondCanvas(currentPdfUrl, currentPdfRole, pdfScrollTop);
    } catch (err) {
      console.error(err);
    }
  } else {
    exitPdfMode();
  }

  isApplyingRemoteData = false;
}

    async function apiFetch(path, options = {}) {
      const headers = { 'Content-Type': 'application/json', ...(options.headers || {}) };
      if (authToken) headers.Authorization = 'Bearer ' + authToken;
      const response = await fetch(WORKER_BASE_URL + path, { ...options, headers });
      const data = await response.json().catch(() => ({}));
      if (!response.ok || data.ok === false) throw new Error(data.error || 'Request failed.');
      return data;
    }
    function queueCloudSave() {

          saveQueued = true;
          return;
        }

      }, 900);

    async function saveProgressToServer() {
      if (!authToken || saveInFlight) return;

      try {
        await apiFetch('/api/save', {
          method: 'POST',
          body: JSON.stringify({ appId: APP_ID, saveData: buildProgressPayload() })
        });
        setSaveStatus('Saved');
      } catch (err) {
        console.error(err);
        setSaveStatus('Save failed');
      } finally {
        saveInFlight = false;
        if (saveQueued) {
          saveQueued = false;
          saveProgressToServer();
        }
      }
    }

    function exitPdfMode() {
      const roleContainer = document.getElementById('role-container');
      const viewer = document.getElementById('pdfViewer');
      const status = document.getElementById('pdfStatus');

    async function renderPdfIntoSecondCanvas(pdfUrl, roleName = '', targetScrollTop = 0) {
      currentPdfUrl = pdfUrl || '';
      currentPdfRole = roleName || '';
      pdfScrollTop = targetScrollTop || 0;
      const roleContainer = document.getElementById('role-container');
      const viewer = document.getElementById('pdfViewer');
      const status = document.getElementById('pdfStatus');
      roleContainer.classList.add('pdf-mode');
      viewer.style.display = 'block';
      viewer.innerHTML = '';
      viewer.scrollTop = 0;
      status.style.display = 'block';
      status.textContent = 'Loading PDF.';
      try {
        const loadingTask = pdfjsLib.getDocument({ url: pdfUrl });
        const pdf = await loadingTask.promise;
        status.textContent = 'Rendering pages.';
        const targetWidth = 920;
        for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
          const page = await pdf.getPage(pageNum);
          const baseViewport = page.getViewport({ scale: 1 });
          const scale = targetWidth / baseViewport.width;
          const viewport = page.getViewport({ scale });
          const canvas = document.createElement('canvas');
          canvas.className = 'pdfPageCanvas';
          canvas.width = Math.floor(viewport.width);
          canvas.height = Math.floor(viewport.height);
          const ctx = canvas.getContext('2d', { alpha: false });
          viewer.appendChild(canvas);
          await page.render({ canvasContext: ctx, viewport }).promise;
        }
        status.style.display = 'none';
        viewer.scrollTop = targetScrollTop || 0;
        queueCloudSave();
      } catch (err) {
        console.error('PDF render error:', err);
        status.textContent = 'Failed to load PDF.';
      }
    }

      document.body.appendChild(overlay);

      let startX = 0;
      let startY = 0;
      let selecting = false;

      function cleanup() {
        selectionOverlayActive = false;
        overlay.remove();
      }
      function updateBox(x1, y1, x2, y2) {
        const left = Math.min(x1, x2);
        const top = Math.min(y1, y2);
        const width = Math.abs(x2 - x1);
        const height = Math.abs(y2 - y1);
        box.style.left = left + 'px';
        box.style.top = top + 'px';
        box.style.width = width + 'px';
        box.style.height = height + 'px';
      }

      overlay.addEventListener('mousedown', function (e) {
        selecting = true;
        startX = e.clientX;
        startY = e.clientY;
        updateBox(startX, startY, startX, startY);
      });
      overlay.addEventListener('mousemove', function (e) {
        if (!selecting) return;
        updateBox(startX, startY, e.clientX, e.clientY);
      });
      overlay.addEventListener('mouseup', async function (e) {
        if (!selecting) return;
        selecting = false;
        const left = Math.min(startX, e.clientX);
        const top = Math.min(startY, e.clientY);
        const width = Math.abs(e.clientX - startX);
        const height = Math.abs(e.clientY - startY);
        cleanup();
        if (width < 8 || height < 8) return;
        try {
          const canvas = await html2canvas(document.body, {
            useCORS: true,
            allowTaint: true,
            logging: false,
            backgroundColor: null,
            scale: window.devicePixelRatio || 1,
            scrollX: -window.scrollX,
            scrollY: -window.scrollY
          });
          const ratio = window.devicePixelRatio || 1;
          const cropCanvas = document.createElement('canvas');
          cropCanvas.width = width * ratio;
          cropCanvas.height = height * ratio;
          const cropCtx = cropCanvas.getContext('2d');
          cropCtx.drawImage(
            canvas,
            left * ratio,
            top * ratio,
            width * ratio,
            height * ratio,
            0,
            0,
            width * ratio,
            height * ratio
          );
          cropCanvas.toBlob(async blob => {
            try {
              if (blob && navigator.clipboard && window.ClipboardItem) {
                await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
                window.open('https://translate.google.com/?sl=en&tl=es&op=images', '_blank');
                showMessagePopup('Your selected image was copied. Paste it into Google Translate.');
              } else {
                window.open('https://translate.google.com/?sl=en&tl=es&op=images', '_blank');
                showMessagePopup('Clipboard copy is not supported here. Please take a screenshot manually and paste it into Google Translate.');
              }
            } catch (err) {
              console.error(err);
              window.open('https://translate.google.com/?sl=en&tl=es&op=images', '_blank');
              showMessagePopup('Copy failed. Please take a screenshot manually and paste it into Google Translate.');
            }
          }, 'image/png');
        } catch (err) {
          console.error(err);
          showMessagePopup('Screenshot capture failed.');
        }
      });
      overlay.addEventListener('contextmenu', function (e) {
        e.preventDefault();
        cleanup();
      });
    }

    function initEventHandlers() {
      document.getElementById('introBtn').addEventListener('click', openIntro);
      document.getElementById('prev-btn').addEventListener('click', prevPage);
      document.getElementById('next-btn').addEventListener('click', nextPage);
      document.getElementById('logoutBtn').addEventListener('click', logout);
      document.getElementById('authRegisterBtn').addEventListener('click', registerUser);
      document.getElementById('authLoginBtn').addEventListener('click', loginUser);
      document.getElementById('auth-password').addEventListener('keydown', function (e) {
        if (e.key === 'Enter') loginUser();
      });
    }

    async function bootstrap() {
      initPdfJs();
      initEventHandlers();
      initProjectButtons();
      initPage13And17Hotspots();
      initSdaButtons();
      initCloudFields();
      initFinalCodeInputs();
      initSecondCanvasHotspots();
      initTranslationWidget();
      restoreSessionLocally();
      showPage(1);
      syncSolvedPagesFromAnswers();
      if (authToken) {
        try {
          await loadProgressFromServer();
        } catch (err) {
          console.error(err);
          setSaveStatus('Load failed');
          maybeRequireAuthOverlay();
        }
      } else {
        maybeRequireAuthOverlay();
      }
    }

    bootstrap();
  </script>
</body>
