
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Square Pyramid Net Slider - Star Opening</title>
  <style>
    :root {
      --bg: #ececec;
      --panel: #f6f6f6;
      --shadow: rgba(0, 0, 0, 0.12);
      --text: #666;
      --accent: #7ae7faff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 18px;
      background: var(--bg);
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
    }

    .app {
      width: min(100%, 1120px);
      background: var(--panel);
      border-radius: 20px;
      box-shadow: 0 12px 28px var(--shadow);
      padding: 18px 18px 22px;
    }

    canvas {
      width: 100%;
      height: auto;
      display: block;
      background: #ececec;
      border-radius: 16px;
    }

    .controls {
      padding-top: 16px;
    }

    input[type="range"] {
      width: 100%;
      margin: 0;
      -webkit-appearance: none;
      appearance: none;
      background: transparent;
    }

    input[type="range"]::-webkit-slider-runnable-track {
      height: 8px;
      border-radius: 999px;
      background: #7ae7faff;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: #000;
      border: none;
      margin-top: -23px;
      box-shadow: 0 0 0 2px rgba(0,0,0,0.08);
      cursor: pointer;
    }

    input[type="range"]::-moz-range-track {
      height: 8px;
      border-radius: 999px;
      background: #7ae7faff;
      border: none;
    }

    input[type="range"]::-moz-range-thumb {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: #000;
      border: none;
      box-shadow: 0 0 0 2px rgba(0,0,0,0.08);
      cursor: pointer;
    }

    .hint {
      text-align: center;
      margin-top: 12px;
      font-size: 13px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="app">
    <canvas id="canvas" width="960" height="540"></canvas>
    <div class="controls">
      <input id="slider" type="range" min="0" max="1000" value="0" />
    </div>
</div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const slider = document.getElementById('slider');

    const S = 190;
    const H = 205;

    const HOLD_START = 0.27;
    const HOLD_END = 0.73;

    const VIEW_YAW = -Math.PI / 4;
    const VIEW_PITCH = 0.9;
    const VIEW_Y_SCALE = 0.92;

    function P(x, y, z) {
      return { x, y, z };
    }

    function add(a, b) {
      return { x: a.x + b.x, y: a.y + b.y, z: a.z + b.z };
    }

    function sub(a, b) {
      return { x: a.x - b.x, y: a.y - b.y, z: a.z - b.z };
    }

    function scale(v, k) {
      return { x: v.x * k, y: v.y * k, z: v.z * k };
    }

    function dot(a, b) {
      return a.x * b.x + a.y * b.y + a.z * b.z;
    }

    function cross(a, b) {
      return {
        x: a.y * b.z - a.z * b.y,
        y: a.z * b.x - a.x * b.z,
        z: a.x * b.y - a.y * b.x
      };
    }

    function normalize(v) {
      const len = Math.hypot(v.x, v.y, v.z) || 1;
      return { x: v.x / len, y: v.y / len, z: v.z / len };
    }

    function rotateAroundAxis(p, a, b, angle) {
      const u = normalize(sub(b, a));
      const v = sub(p, a);
      const c = Math.cos(angle);
      const s = Math.sin(angle);
      const term1 = scale(v, c);
      const term2 = scale(cross(u, v), s);
      const term3 = scale(u, dot(u, v) * (1 - c));
      return add(a, add(add(term1, term2), term3));
    }

    function rotateY(p, angle) {
      const c = Math.cos(angle);
      const s = Math.sin(angle);
      return {
        x: p.x * c + p.z * s,
        y: p.y,
        z: -p.x * s + p.z * c
      };
    }

    function rotateX(p, angle) {
      const c = Math.cos(angle);
      const s = Math.sin(angle);
      return {
        x: p.x,
        y: p.y * c - p.z * s,
        z: p.y * s + p.z * c
      };
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function clamp01(v) {
      return Math.max(0, Math.min(1, v));
    }

    function smooth01(v) {
      const t = clamp01(v);
      return t * t * (3 - 2 * t);
    }

    const A = P(-S / 2, 0, -S / 2);
    const B = P(-S / 2, 0,  S / 2);
    const C = P( S / 2, 0,  S / 2);
    const D = P( S / 2, 0, -S / 2);
    const Apex = P(0, H, 0);

    const slantHeight = Math.hypot(H, S / 2);
    const flatAngleMag = Math.PI - Math.atan2(H, S / 2);

    function dist2(a, b) {
      const dx = a.x - b.x;
      const dy = a.y - b.y;
      const dz = a.z - b.z;
      return dx * dx + dy * dy + dz * dz;
    }

    function chooseFlatAngle(edgeA, edgeB, target) {
      const p1 = rotateAroundAxis(Apex, edgeA, edgeB, flatAngleMag);
      const p2 = rotateAroundAxis(Apex, edgeA, edgeB, -flatAngleMag);
      return dist2(p1, target) <= dist2(p2, target) ? flatAngleMag : -flatAngleMag;
    }

    const leftTarget = P(-S / 2 - slantHeight, 0, 0);
    const topTarget = P(0, 0, S / 2 + slantHeight);
    const rightTarget = P(S / 2 + slantHeight, 0, 0);
    const frontTarget = P(0, 0, -S / 2 - slantHeight);

    const leftOpenAngle = chooseFlatAngle(A, B, leftTarget);
    const topOpenAngle = chooseFlatAngle(B, C, topTarget);
    const rightOpenAngle = chooseFlatAngle(C, D, rightTarget);
    const frontOpenAngle = chooseFlatAngle(D, A, frontTarget);

    function buildFaces(t) {
      const leftApex = rotateAroundAxis(Apex, A, B, leftOpenAngle * t);
      const topApex = rotateAroundAxis(Apex, B, C, topOpenAngle * t);
      const rightApex = rotateAroundAxis(Apex, C, D, rightOpenAngle * t);
      const frontApex = rotateAroundAxis(Apex, D, A, frontOpenAngle * t);

      return [
        { name: 'base', pts: [A, B, C, D] },
        { name: 'left', pts: [A, B, leftApex] },
        { name: 'top', pts: [B, C, topApex] },
        { name: 'right', pts: [C, D, rightApex] },
        { name: 'front', pts: [D, A, frontApex] }
      ];
    }

    function viewTransform(p) {
      const r1 = rotateY(p, VIEW_YAW);
      return rotateX(r1, VIEW_PITCH);
    }

    function project(p) {
      const v = viewTransform(p);
      return {
        x: v.x,
        y: -v.y * VIEW_Y_SCALE,
        depth: v.z
      };
    }

    function sliderToProgress(value) {
      const s = Math.max(0, Math.min(1, value / 1000));
      if (s <= HOLD_START) return s / HOLD_START;
      if (s <= HOLD_END) return 1;
      return 1 - (s - HOLD_END) / (1 - HOLD_END);
    }

    let fit = null;
    let progress = sliderToProgress(Number(slider.value));

    function computeFit() {
      let minX = Infinity;
      let maxX = -Infinity;
      let minY = Infinity;
      let maxY = -Infinity;

      for (let i = 0; i <= 240; i++) {
        const t = i / 240;
        const faces = buildFaces(t);
        for (const face of faces) {
          for (const p of face.pts) {
            const q = project(p);
            minX = Math.min(minX, q.x);
            maxX = Math.max(maxX, q.x);
            minY = Math.min(minY, q.y);
            maxY = Math.max(maxY, q.y);
          }
        }
      }

      const padding = 42;
      const scale = Math.min(
        (canvas.width - padding * 2) / (maxX - minX),
        (canvas.height - padding * 2) / (maxY - minY)
      );

      return {
        scale,
        offsetX: canvas.width / 2 - ((minX + maxX) / 2) * scale,
        offsetY: canvas.height / 2 - ((minY + maxY) / 2) * scale
      };
    }

    function toScreen(p) {
      const q = project(p);
      return {
        x: q.x * fit.scale + fit.offsetX,
        y: q.y * fit.scale + fit.offsetY,
        depth: q.depth
      };
    }

    
    function facePaint(face, pts, t) {
      const xs = pts.map(p => p.x);
      const ys = pts.map(p => p.y);
      const minX = Math.min(...xs);
      const maxX = Math.max(...xs);
      const minY = Math.min(...ys);
      const maxY = Math.max(...ys);
      const g = ctx.createLinearGradient(minX, minY, maxX, maxY);

      if (face.name === 'base') {
        g.addColorStop(0, 'rgba(150, 132, 255, 0.82)');
        g.addColorStop(0.5, 'rgba(118, 103, 232, 0.82)');
        g.addColorStop(1, 'rgba(86, 83, 194, 0.82)');
        return g;
      }

      if (face.name === 'left') {
        g.addColorStop(0, 'rgba(226, 201, 255, 0.82)');
        g.addColorStop(0.55, 'rgba(190, 146, 246, 0.82)');
        g.addColorStop(1, 'rgba(130, 102, 222, 0.82)');
        return g;
      }

      if (face.name === 'top') {
        g.addColorStop(0, 'rgba(244, 224, 255, 0.82)');
        g.addColorStop(0.52, 'rgba(221, 171, 248, 0.82)');
        g.addColorStop(1, 'rgba(164, 119, 236, 0.82)');
        return g;
      }

      if (face.name === 'right') {
        g.addColorStop(0, 'rgba(154, 167, 255, 0.82)');
        g.addColorStop(0.52, 'rgba(112, 126, 234, 0.82)');
        g.addColorStop(1, 'rgba(73, 89, 196, 0.82)');
        return g;
      }

      g.addColorStop(0, 'rgba(218, 181, 255, 0.82)');
      g.addColorStop(0.5, 'rgba(185, 135, 242, 0.82)');
      g.addColorStop(1, 'rgba(126, 96, 214, 0.82)');
      return g;
    }

    function drawFace(face) {
      const pts = face.pts.map(toScreen);

      ctx.beginPath();
      ctx.moveTo(pts[0].x, pts[0].y);
      for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
      ctx.closePath();

      ctx.fillStyle = facePaint(face, pts, progress);
      ctx.fill();
    }

    function render() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const faces = buildFaces(progress);

      const enriched = faces.map(face => {
        const depths = face.pts.map(p => viewTransform(p).z);
        return {
          ...face,
          depth: depths.reduce((a, b) => a + b, 0) / depths.length
        };
      });

      enriched.sort((a, b) => a.depth - b.depth);
      for (const face of enriched) drawFace(face);
    }

    fit = computeFit();
    render();

    slider.addEventListener('input', () => {
      progress = sliderToProgress(Number(slider.value));
      render();
    });
  </script>
</body>
</html>
